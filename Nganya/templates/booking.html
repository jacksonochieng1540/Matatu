<!DOCTYPE html>
<html>
<head>
    <title>Book Seat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded shadow-md w-full max-w-md">

        <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">Book Your Seat</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="text-red-600 text-sm mb-2">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" id="bookingForm">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit"
                    class="w-full bg-green-500 text-white py-2 px-4 rounded hover:bg-green-600 transition duration-200">
                Confirm Booking
            </button>
        </form>

        <div class="mt-4 text-center">
            <a href="{% url 'home' %}" class="text-sm text-blue-500 hover:underline">Back to Home</a>
        </div>
    </div>
</div>

<!-- Optional JS: Confirm valid seat number range -->
<script>
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        const seat = document.getElementById('id_seat_number').value;
        if (parseInt(seat) <= 0 || isNaN(seat)) {
            alert("Please enter a valid seat number.");
            e.preventDefault();
        }
    });
</script>

</body>
</html>
